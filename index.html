<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini World Reward</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("https://i.imgur.com/3ZQ3Z6G.jpg") no-repeat center;
    background-size: cover;
    color: white;
}

/* lớp nền tối */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 20px;
}

.box {
    max-width: 400px;
    margin: auto;
    background: rgba(20,30,50,0.9);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px #000;
}

h1 {
    text-align: center;
}

/* avatar */
.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: block;
    margin: auto;
    border: 3px solid #00ffcc;
}

/* số xu */
.coin {
    text-align: center;
    font-size: 40px;
    margin: 20px 0;
}

/* button */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 16px;
    cursor: pointer;
}

.green {
    background: #2ecc71;
}

.yellow {
    background: #f1c40f;
}

.red {
    background: #e74c3c;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

/* hiệu ứng */
.btn:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="overlay">
<div class="box">

<img class="avatar" src="https://i.imgur.com/J6l19aF.png">

<h1>Mini World Reward</h1>

<h3 id="user">Khang</h3>

<button class="btn red" onclick="logout()">Thoát</button>

<div class="coin" id="coin">0</div>
<p style="text-align:center">Đậu Mini World</p>

<button class="btn green" onclick="watchAd()">Xem QC +20 đậu</button>

<h3>Rút đậu</h3>

<input placeholder="ID game">
<input placeholder="Tên">
<input id="amount" placeholder="Số đậu">

<button class="btn yellow" onclick="withdraw()">Rút đậu</button>

<button class="btn" onclick="admin()">Admin</button>

</div>
</div>

<script>
let coin = localStorage.getItem("coin") || 0;
document.getElementById("coin").innerText = coin;

function watchAd(){
    alert("Đang xem quảng cáo...");
    setTimeout(()=>{
        coin = parseInt(coin) + 20;
        localStorage.setItem("coin", coin);
        document.getElementById("coin").innerText = coin;
        alert("Nhận +20 đậu!");
    },2000);
}

function withdraw(){
    let amount = document.getElementById("amount").value;

    if(amount > coin){
        alert("Không đủ đậu!");
        return;
    }

    coin -= amount;
    localStorage.setItem("coin", coin);
    document.getElementById("coin").innerText = coin;

    alert("Đã gửi yêu cầu rút!");
}

function logout(){
    alert("Đã thoát!");
}

function admin(){
    alert("Trang admin (bạn sẽ làm sau)");
}
</script>

</body>
</html>
