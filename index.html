<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniWorld Reward Pro</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{max-width:400px;margin:auto;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:15px;margin-bottom:10px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{font-weight:bold;cursor:pointer}
.green{background:#22c55e}
.blue{background:#3b82f6}
.yellow{background:#facc15;color:#000}
.red{background:#ef4444}
.center{text-align:center}
</style>
</head>

<body>
<div class="container">

<div id="login" class="card">
<h2 class="center">MiniWorld Reward</h2>
<input id="user" placeholder="Tài khoản">
<button class="blue" onclick="login()">Đăng nhập</button>
</div>

<div id="app" style="display:none">
<div class="card">
<b id="name"></b>
<button class="red" onclick="logout()">Thoát</button>
</div>

<div class="card center">
<h1 id="coin">0</h1>
<p>Đậu Mini World</p>
</div>

<div class="card">
<button class="green" onclick="watch()">Xem QC +20 đậu</button>
</div>

<div class="card">
<input id="id" placeholder="ID game">
<input id="nick" placeholder="Tên">
<input id="amount" type="number" placeholder="Số đậu">
<button class="yellow" onclick="withdraw()">Rút đậu</button>
</div>

<button onclick="openAdmin()">Admin</button>
</div>

<div id="admin" style="display:none" class="container"></div>

</div>

<script>
let user="",coins=0,last=0

function save(){
localStorage.setItem("user",user)
localStorage.setItem("coin_"+user,coins)
}

function login(){
user=document.getElementById("user").value
coins=Number(localStorage.getItem("coin_"+user))||0
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("name").innerText=user
update()
}

function logout(){localStorage.clear();location.reload()}

function update(){document.getElementById("coin").innerText=coins}

function watch(){
let now=Date.now()
if(now-last<10000) return alert("Đợi 10s")
last=now
coins+=20
save()
update()
alert("+20 đậu")
}

function withdraw(){
let id=document.getElementById("id").value
let nick=document.getElementById("nick").value
let amount=Number(document.getElementById("amount").value)
if(!id||!nick||!amount) return alert("Nhập đủ")
if(amount>coins) return alert("Không đủ")
coins-=amount
save()
update()

let list=JSON.parse(localStorage.getItem("req")||"[]")
list.push({user,id,nick,amount,status:"Chờ"})
localStorage.setItem("req",JSON.stringify(list))
alert("Đã gửi")
}

function openAdmin(){
document.getElementById("app").style.display="none"
document.getElementById("admin").style.display="block"
load()
}

function load(){
let list=JSON.parse(localStorage.getItem("req")||"[]")
let html="<h2>Admin</h2>"
list.forEach((r,i)=>{
html+=`<div class="card">
${r.user} - ${r.amount} đậu<br>
${r.nick} (${r.id})<br>
${r.status}<br>
<button onclick="done(${i})">Đã gửi</button>
</div>`
})
document.getElementById("admin").innerHTML=html
}

function done(i){
let list=JSON.parse(localStorage.getItem("req")||"[]")
list[i].status="Đã gửi"
localStorage.setItem("req",JSON.stringify(list))
load()
}
</script>
</body>
</html>
