<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniWorld Reward</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: url("https://i.imgur.com/8Km9tLL.jpg") no-repeat center/cover;
    color:white;
}

/* overlay */
.overlay{
    background: rgba(0,0,0,0.6);
    min-height:100vh;
    padding:20px;
}

/* card */
.box{
    background: rgba(30,41,59,0.9);
    padding:20px;
    border-radius:15px;
    margin:15px auto;
    max-width:400px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* title */
h1{
    text-align:center;
    color:#22c55e;
}

/* input */
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    border:none;
}

/* button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-weight:bold;
}

/* colors */
.green{background:#22c55e;}
.yellow{background:#facc15;color:black;}
.red{background:#ef4444;}
.blue{background:#3b82f6;}
</style>

</head>

<body>
<div class="overlay">

<h1>🌍 Mini World Reward</h1>

<!-- LOGIN -->
<div id="login" class="box">
<h3>Đăng nhập</h3>
<input id="username" placeholder="Tên người chơi">
<input id="password" type="password" placeholder="Mật khẩu">
<button class="blue" onclick="login()">Đăng nhập</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="box">
<h3 id="user"></h3>
<button class="red" onclick="logout()">Thoát</button>
</div>

<div class="box" style="text-align:center">
<h1 id="coin">0</h1>
<p>Đậu Mini World</p>
</div>

<div class="box">
<button class="green" onclick="watchAd()">🎬 Xem QC +20 đậu</button>
</div>

<div class="box">
<h3>Rút đậu</h3>
<input id="gameid" placeholder="ID game">
<input id="name" placeholder="Tên">
<input id="amount" placeholder="Số đậu">
<button class="yellow" onclick="withdraw()">Rút đậu</button>
</div>

<div class="box">
<button onclick="admin()">👑 Admin</button>
</div>

</div>

</div>

<script>
let coins = 0;

function login(){
    let user = username.value;
    localStorage.setItem("user", user);

    login.style.display="none";
    app.style.display="block";
    document.getElementById("user").innerText = "👤 " + user;
}

function logout(){
    location.reload();
}

function watchAd(){
    alert("Bạn đã xem quảng cáo!");
    coins += 20;
    document.getElementById("coin").innerText = coins;
}

function withdraw(){
    alert("Yêu cầu rút đã gửi!");
}

function admin(){
    alert("Trang admin (bản demo)");
}
</script>

</body>
</html>
