<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MiniWorld Reward</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;text-align:center}
.box{background:#1e293b;padding:20px;margin:20px;border-radius:10px}
button{padding:10px;border:none;border-radius:8px;margin:5px}
</style>
</head>

<body>

<div id="login">
<h2>Đăng nhập</h2>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Mật khẩu"><br>
<button onclick="login()">Đăng nhập</button>
<button onclick="register()">Đăng ký</button>
</div>

<div id="app" style="display:none">
<h2 id="user"></h2>

<div class="box">
<h1 id="coin">0</h1>
Đậu Mini World
</div>

<button onclick="watchAd()">Xem QC +20</button>

<div class="box">
<input id="gameid" placeholder="ID game"><br>
<input id="name" placeholder="Tên"><br>
<input id="amount" placeholder="Số đậu"><br>
<button onclick="withdraw()">Rút đậu</button>
</div>

</div>

<script>
// DÁN CONFIG FIREBASE CỦA BẠN VÀO ĐÂY
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function register(){
auth.createUserWithEmailAndPassword(email.value, pass.value);
}

function login(){
auth.signInWithEmailAndPassword(email.value, pass.value);
}

auth.onAuthStateChanged(user=>{
if(user){
login.style.display="none";
app.style.display="block";
document.getElementById("user").innerText=user.email;

loadCoin();
}
});

function loadCoin(){
db.collection("users").doc(auth.currentUser.uid).get().then(d=>{
if(d.exists){
coin.innerText=d.data().coin;
}else{
db.collection("users").doc(auth.currentUser.uid).set({coin:0});
}
});
}

function watchAd(){
let c = parseInt(coin.innerText)+20;
coin.innerText=c;
db.collection("users").doc(auth.currentUser.uid).update({coin:c});
}

function withdraw(){
db.collection("withdraw").add({
uid:auth.currentUser.uid,
id:gameid.value,
name:name.value,
amount:amount.value
});
alert("Đã gửi yêu cầu");
}
</script>

</body>
</html>aler
